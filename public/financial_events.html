<html>
    <head>
        <title>Financial Events</title>
        <link rel="stylesheet" href="styles.css">
        <script src="app.js" defer></script>
    </head>
    <body>
        <div class="app-shell">
            <aside class="sidebar">
                <button class="nav-toggle">☰</button>
                <nav>
                    <a href="financial_events.html">Financial Events</a>
                    <a href="#">Dashboard</a>
                    <a href="#">Paychecks</a>
                    <a href="#">Settings</a>
                </nav>
            </aside>

            <main class="content">
                <section class="table-panel">
                    <h1>Financial Events</h1>
                    <table>
                        <thead>
                            <tr>
                                <th class="left">Name</th>
                                <th class="left">Type</th>
                                <th class="left">Amount</th>
                                <th class="left">Next Due Date</th>
                                <th>Frequency</th>
                                <th>Active</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="events-table-body"></tbody>
                    </table>
                </section>
            </main>
            <aside class="form-panel">
                <form id="event-form">
                    <h2>Add Event</h2>
                            <label for="type">Type</label>
                            <br />
                            <select id="type" name="type">
                                <option value="Bill">Bill</option>
                                <option value="Paycheck">Paycheck</option>
                            </select>
                            <br />
                            <label for="name">Name</label>
                            <br />
                            <input type="text" id="name" name="name">
                            <br />
                            <label for="amount">Amount</label>
                            <br />
                            <input type="number" step="0.01" id="amount" name="number">
                            <br />
                            <label for="due_date">Due Date</label>
                            <br />
                            <input type="date" id="due_date" name="date">
                            <br />
                            <label for="frequency">Frequency</label>
                            <br />
                            <select id="frequency" name="frequency">
                                <option value="Monthly">Monthly</option>
                                <option value="Biweekly">Biweekly</option>
                                <option value="Weekly">Weekly</option>
                                <option value="Daily">Daily</option>
                                <option value="One-Time">One-Time</option>
                                <option value="Annually">Annually</option>
                                <option value="Quarterly">Quarterly</option>
                                <option value="Semi-Annually">Semi-Annually</option>
                            </select>
                            <br />
                            <button type="submit">Add Event</button>

                        </div>
                </form>
            </aside>
        </div>
    </body>
</html>
